services:
  postgres:
    image: postgres:16-alpine
    container_name: zythologue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zythologue
      POSTGRES_USER: zythologue
      POSTGRES_PASSWORD: zythologue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zythologue -d zythologue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
